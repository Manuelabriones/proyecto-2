<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Passwords</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Generador de Passwords</h1>

        <input type="text" id="password" readonly placeholder="Tu contraseña aparecerá aquí">

        <div class="options">

            <label>
                <input type="checkbox" id="mayusculas" checked>
                Incluir mayúsculas
            </label>

            <label>
                <input type="checkbox" id="numeros" checked>
                Incluir números
            </label>

            <label>
                <input type="checkbox" id="simbolos" checked>
                Incluir símbolos
            </label>

        </div>

        <button id="generar">Generar Password</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
